[variables]
NODE_VERSION = "18"
NIXPACKS_METADATA = "nodejs,pnpm"

[phases.setup]
nixPkgs = ["nodejs-18_x", "corepack"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.12.1 --activate", 
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm run build"]

[phases.start]
cmd = "pnpm start"

[variables]
NODE_ENV = "production"
PNPM_HOME = "/pnpm"
PATH = "$PNPM_HOME:$PATH" 